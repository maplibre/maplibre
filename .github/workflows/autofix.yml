name: autofix.ci # See https://autofix.ci/security why this name

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  markdownlint:
    name: Fix markdownlint issues
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Auto-fix markdown
        run: npx --yes markdownlint-cli --fix *.md
        continue-on-error: true
      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
        with: { commit-message: "chore: fix markdownlint issues" }

  sort-voting-members:
    name: Sort VOTING_MEMBERS.md
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - name: Sort members alphabetically by GitHub handle
        run: |
          python3 - <<'PY'
          import re
          lines = open('VOTING_MEMBERS.md').read().split('\n')
          start = next(i for i, l in enumerate(lines) if l.startswith('[@'))
          header = lines[:start]
          members = [l for l in lines[start:] if l.startswith('[@')]
          key = lambda l: re.match(r'\[@([^\]]+)\]', l).group(1).lower()
          out = '\n'.join(header) + '\n' + '\n\n'.join(sorted(members, key=key)) + '\n'
          open('VOTING_MEMBERS.md', 'w').write(out)
          PY
      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
        with: { commit-message: "chore: sort VOTING_MEMBERS.md" }
